<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Everything Store</title>
    <link rel="stylesheet" href="mikaela.css" />
    <style>
      /* Style khusus untuk halaman toko */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 2rem;
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .product-card {
        background-color: var(--contact-bg-color);
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease,
          background-color 0.4s ease, opacity 0.3s ease;
        /* Animasi saat muncul */
        opacity: 0; /* Mulai dari transparan */
        animation: product-fade-in 0.5s ease-out forwards;
      }
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }
      .product-card .product-image-wrapper {
        overflow: hidden; /* Memastikan gambar tidak keluar dari border-radius */
      }
      .product-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        /* Hapus style default dari mikaela.css yang mungkin bentrok */
        border-radius: 0;
        box-shadow: none;
        transition: transform 0.5s ease;
      }
      .product-card:hover img {
        transform: scale(1.05);
      }
      .product-info {
        padding: 1.5rem;
      }
      .product-info h3 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: 1.2rem;
        color: var(--text-color);
        transition: color 0.4s ease;
      }
      .product-info .price {
        font-size: 1.1rem;
        font-weight: bold;
        color: #d83a7c; /* Warna khas tema */
        margin-bottom: 1rem;
      }
      .product-info .stock {
        font-size: 0.9rem;
        color: var(--role-text-color, #666);
        margin-bottom: 1rem;
        transition: color 0.4s ease;
      }
      .product-info .stock.low {
        color: #e67e22; /* Oranye untuk stok menipis */
        font-weight: bold;
      }
      .product-info .stock.out-of-stock {
        color: #e74c3c; /* Merah untuk stok habis */
        font-weight: bold;
      }
      .product-card.out-of-stock {
        opacity: 0.7;
      }
      .product-card.out-of-stock .button {
        background-color: #95a5a6;
        cursor: not-allowed;
      }
      /* Menggunakan kembali class .button dari mikaela.css */
      a.product-link {
        text-decoration: none;
        color: inherit;
        display: block; /* Membuat link mengisi seluruh area grid */
      }
      .search-container {
        max-width: 600px;
        margin: 0 auto 2rem auto;
        padding: 0 1rem;
      }
      #search-input {
        width: 100%;
        padding: 12px 15px;
        font-size: 1rem;
        border-radius: 8px;
        border: 1px solid var(--input-border-color, #ccc);
        background-color: var(--input-bg, #fff);
        color: var(--input-text, #333);
        box-sizing: border-box;
        transition: all 0.3s ease;
      }
      #search-input:focus {
        outline: none;
        border-color: var(--input-focus-border-color, #d83a7c);
        box-shadow: 0 0 0 3px rgba(216, 58, 124, 0.2);
      }
      /* Keyframes untuk animasi produk */
      @keyframes product-fade-in {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="is-loading">
    <button class="hamburger-menu" aria-label="Buka menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="overlay"></div>

    <nav class="nav">
      <a href="index.html">Beranda</a>
      <a href="about.html"> Bio Mikaela </a>
      <a href="everything.html"> Everything </a>
      <a href="everythingstore.html">Store</a>
      <a href="List.html"> Saluran Everything JKT48 </a>
      <a href="profile.html">Profil</a>
      <a href="account-list.html" id="account-list-link" style="display: none"
        >Data Akun</a
      >
      <a href="add-admin.html" id="add-admin-link" style="display: none"
        >Tambah Admin</a

      <a href="manage-store.html" id="manage-store-link" style="display: none"
        >Kelola Toko</a

    <h1 class="title">Everything Store</h1>

    <!-- Kolom Pencarian -->
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Cari produk..." />
    </div>

    <main class="product-grid"></main>

    <footer class="footer">
      <p>&copy; 2024 Raffz. All rights reserved.</p>
    </footer>

    <!-- Firebase SDK & Skrip Autentikasi -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="auth.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      applyInitialTheme();
      checkAuthentication((user, userData) => {
        document.body.classList.remove("is-loading");
        manageNavLinks(userData);
        setupThemeSwitcher();
        setupLogoutButton();
        setupMobileMenu();

        // --- Logika Halaman Toko ---
        const productGrid = document.querySelector(".product-grid");
        const searchInput = document.getElementById("search-input");
        let allProducts = []; // Cache untuk menyimpan semua produk

        productGrid.innerHTML = "<p>Memuat produk...</p>";

        // Fungsi untuk merender produk ke dalam grid
        const renderProducts = (productsToRender) => {
          if (productsToRender.length === 0) {
            // Cek apakah ada filter aktif atau memang tidak ada produk sama sekali
            if (searchInput.value) {
              productGrid.innerHTML = `<p>Tidak ada produk yang cocok dengan pencarian "${searchInput.value}".</p>`;
            } else {
              productGrid.innerHTML = "<p>Belum ada produk yang dijual.</p>";
            }
            return;
          }

          productGrid.innerHTML = ""; // Kosongkan grid
          productsToRender.forEach((product, index) => {
            const productName = product.name;
            const productPrice = `Rp ${product.price.toLocaleString("id-ID")}`;
            const stock = product.stock;

            // Nomor WhatsApp dan pesan otomatis
            const whatsAppNumber = "6285175214182";
            const message = `Halo, saya tertarik untuk membeli produk "${productName}" dengan harga ${productPrice}. Apakah produk ini masih tersedia?`;
            const encodedMessage = encodeURIComponent(message);
            const whatsAppLink = `https://wa.me/${whatsAppNumber}?text=${encodedMessage}`;

            let stockHTML = "";
            let cardClass = "";

            if (stock > 0) {
              const stockClass = stock <= 5 ? "stock low" : "stock";
              stockHTML = `<p class="${stockClass}">Sisa stok: ${stock}</p>`;
            } else {
              stockHTML = `<p class="stock out-of-stock">Stok Habis</p>`;
              cardClass = "out-of-stock";
            }

            const productCardHTML = `
              <a href="product-detail.html?id=${
                product.id
              }" class="product-link" title="Lihat detail ${productName}">
                <div class="product-card ${cardClass}" style="animation-delay: ${
              index * 50
            }ms">
                  <div class="product-image-wrapper">
                    <img src="${product.imageUrl}" alt="${productName}">
                  </div>
                  <div class="product-info">
                    <h3>${productName}</h3>
                    <p class="price">${productPrice}</p>
                    ${stockHTML}
                  </div>
                </div>
              </a>
            `;
            productGrid.insertAdjacentHTML("beforeend", productCardHTML);
          });
        };

        // Listener untuk input pencarian
        searchInput.addEventListener("input", () => {
          const searchTerm = searchInput.value.toLowerCase().trim();
          const filteredProducts = allProducts.filter((product) =>
            product.name.toLowerCase().includes(searchTerm)
          );
          renderProducts(filteredProducts);
        });

        // Menggunakan onSnapshot untuk pembaruan real-time
        db.collection("products")
          .orderBy("createdAt", "desc")
          .onSnapshot(
            (snapshot) => {
              // Simpan semua produk ke cache lokal
              allProducts = snapshot.docs.map((doc) => {
                return { id: doc.id, ...doc.data() };
              });
              // Panggil fungsi filter dan render dengan memicu event 'input'
              searchInput.dispatchEvent(new Event("input"));
            },
            (error) => {
              console.error("Error getting real-time products: ", error);
              productGrid.innerHTML =
                "<p>Gagal memuat produk. Silakan coba lagi nanti.</p>";
            }
          );
      });
    </script>
  </body>
</html>
