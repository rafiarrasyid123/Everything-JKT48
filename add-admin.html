<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Admin - Mikaela Fan Page</title>
    <link rel="stylesheet" href="mikaela.css" />
    <style>
      /* Variabel Tema untuk Halaman Admin */
      :root,
      [data-theme="light"] {
        --body-bg: #f0f2f5;
        --container-bg: white;
        --text-color: #333;
        --input-bg: #ffffff;
        --input-border: #ccc;
        --input-text: #212529;
        --link-color: #007bff;
      }
      [data-theme="dark"] {
        --body-bg: #1a202c;
        --container-bg: #2d3748;
        --text-color: #e2e8f0;
        --input-bg: #1a202c;
        --input-border: #4a5568;
        --input-text: #e2e8f0;
        --link-color: #63b3ed;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--body-bg);
        color: var(--text-color);
        font-family: sans-serif;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      .admin-container {
        background: var(--container-bg);
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
        margin-top: 20px;
        transition: background-color 0.4s ease;
      }
      .admin-container h1 {
        margin-bottom: 1.5rem;
        color: var(--text-color);
        transition: color 0.4s ease;
      }
      .admin-container input {
        box-sizing: border-box;
        width: 100%;
        padding: 10px;
        margin-bottom: 1rem;
        border: 1px solid var(--input-border);
        background-color: var(--input-bg);
        color: var(--input-text);
        transition: background-color 0.4s ease, color 0.4s ease,
          border-color 0.4s ease;
        border-radius: 4px;
      }
      .admin-container button {
        width: 100%;
        padding: 10px;
        background-color: #d83a7c;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }
      .admin-container a {
        display: block;
        margin-top: 1rem;
        color: var(--link-color);
        text-decoration: none;
        transition: color 0.4s ease;
      }
      #message {
        color: red;
        margin-top: 1rem;
        height: 2em;
      }
    </style>
  </head>
  <body class="is-loading">
    <!-- Pengecekan login dan role admin -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="auth.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      applyInitialTheme();
      checkAuthentication(() => {
        document.body.classList.remove("is-loading");
      });
      protectAdminRoute();
    </script>

    <div class="admin-container">
      <h1>Tambah Admin Baru</h1>
      <div
        class="warning"
        style="
          color: #8b0000;
          background-color: #fff3cd;
          border: 1px solid #ffeeba;
          padding: 10px;
          border-radius: 5px;
          margin-top: 20px;
        "
      >
        <strong>Fitur Dinonaktifkan:</strong> Menambah admin baru secara aman
        memerlukan backend (Firebase Cloud Functions) untuk menetapkan peran
        khusus (Custom Claims).
      </div>
      <form id="add-admin-form">
        <div>
          <input
            type="text"
            id="username"
            placeholder="Username Admin Baru"
            disabled
          />
        </div>
        <div>
          <input
            type="password"
            id="password"
            placeholder="Password Admin Baru"
            disabled
          />
        </div>
        <button type="submit" disabled>Tambah Admin</button>
      </form>
      <p id="message"></p>
      <a href="index.html">Kembali ke Beranda</a>
    </div>
  </body>
</html>
