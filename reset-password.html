<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password - Mikaela</title>
    <link rel="stylesheet" href="mikaela.css" />
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Reset Password</h1>
            <form id="resetForm" class="login-form">
                <div class="form-group">
                    <label for="resetEmail">Email:</label>
                    <input type="email" id="resetEmail" name="email" required>
                    <small class="form-help">Masukkan email yang terdaftar</small>
                </div>

                <button type="submit" class="login-btn">Kirim Link Reset</button>
            </form>

            <div class="login-links">
                <a href="index.html" class="auth-link">Kembali ke Login</a>
            </div>

            <div id="resetMessage" class="message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
