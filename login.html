<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Mikaela Fan Page</title>
    <link rel="stylesheet" href="mikaela.css" />
    <style>
      /* Variabel Tema untuk Halaman Login */
      :root,
      [data-theme="light"] {
        --container-bg: rgba(255, 255, 255, 0.8);
        --text-color: #333;
        --input-bg: #ffffff;
        --input-border: #ccc;
        --input-text: #212529;
        --label-color: #555;
        --link-color: #007bff;
      }
      [data-theme="dark"] {
        --container-bg: rgba(28, 28, 30, 0.85);
        --text-color: #f2f2f2;
        --input-bg: #3a3a3c;
        --input-border: #545458;
        --input-text: #f2f2f2;
        --label-color: #a3a3a3;
        --link-color: #63b3ed;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        background-image: url("Gambar/Mikaela.jpg");
        background-size: contain; /* Mengubah agar seluruh gambar terlihat */
        background-position: center;
        background-repeat: no-repeat;
        background-color: #000; /* Menambah warna latar untuk mengisi ruang kosong */
      }
      .login-container {
        background-color: var(--container-bg);
        transition: background-color 0.4s ease;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 2rem;
        border-radius: 15px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        border: 1px solid rgba(255, 255, 255, 0.18);
        text-align: center;
        width: 100%;
        max-width: 400px;
        animation: fadeInUp 0.8s ease-out forwards; /* Animasi saat muncul */
      }
      /* Definisi animasi */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .status-indicator-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      #firebase-status {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: #f39c12; /* Kuning: Menghubungkan... */
        transition: background-color 0.5s ease;
      }
      #firebase-status.connected {
        background-color: #2ecc71; /* Hijau: Terhubung */
      }
      #firebase-status.error {
        background-color: #e74c3c; /* Merah: Gagal */
      }
      .login-container h1 {
        margin-bottom: 1.5rem;
        color: var(--text-color);
        transition: color 0.4s ease;
      }
      .login-container input {
        box-sizing: border-box; /* Menangani padding dan border dengan lebih baik */
        width: 100%;
        padding: 10px;
        margin-bottom: 1rem;
        border: 1px solid var(--input-border);
        border-radius: 4px;
        background-color: var(--input-bg);
        color: var(--input-text);
        transition: background-color 0.4s ease, color 0.4s ease,
          border-color 0.4s ease;
      }
      .login-container button {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        background-color: #d83a7c; /* Warna yang lebih sesuai tema JKT48 */
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }
      .google-btn {
        background-color: #4285f4;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 1rem;
        transition: background-color 0.3s;
        border: none; /* Override default button styles if any */
        cursor: pointer;
      }
      .google-btn:hover {
        background-color: #357ae8;
      }

      .remember-me {
        display: flex;
        align-items: center;
        margin-bottom: 1rem;
        justify-content: flex-start;
      }
      .remember-me input {
        width: auto; /* Override default input width */
        margin-right: 8px;
        margin-bottom: 0;
      }
      .remember-me label {
        color: var(--label-color);
        font-size: 0.9rem;
        cursor: pointer;
        transition: color 0.4s ease;
      }
      #error-message {
        color: red;
        margin-top: 1rem;
        height: 1em;
      }
      .links {
        margin-top: 1.5rem;
        display: flex;
        justify-content: space-between;
      }
      .links a {
        color: var(--link-color);
        transition: color 0.4s ease;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="status-indicator-wrapper">
        <h1>Silakan Login</h1>
        <span id="firebase-status" title="Menghubungkan ke Firebase..."></span>
      </div>
      <form id="login-form">
        <div>
          <input
            type="text"
            id="login-input"
            placeholder="Email atau Username"
            required
          />
        </div>
        <div>
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
        </div>
        <button type="submit">Login</button>
      </form>
      <p id="error-message"></p>

      <!-- Tombol Login dengan Google -->
      <button id="google-login-btn" class="google-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          x="0px"
          y="0px"
          width="20"
          height="20"
          viewBox="0 0 48 48"
        >
          <path
            fill="#FFC107"
            d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"
          ></path>
          <path
            fill="#FF3D00"
            d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"
          ></path>
          <path
            fill="#4CAF50"
            d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.222,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"
          ></path>
          <path
            fill="#1976D2"
            d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C44.572,36.833,48,30.826,48,24C48,22.659,47.862,21.35,47.611,20.083z"
          ></path>
        </svg>
        <span>Login dengan Google</span>
      </button>

      <div class="links">
        <a href="forgot-password.html">Lupa Password?</a>
        <a href="register.html">Buat Akun</a>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Konfigurasi Firebase kita -->
    <script src="firebase-config.js"></script>

    <script>
      const statusIndicator = document.getElementById("firebase-status");

      // Cek koneksi ke Firebase setelah inisialisasi
      try {
        // Jika objek 'auth' dari firebase-config.js berhasil dibuat,
        // berarti inisialisasi dasar berhasil.
        if (auth) {
          statusIndicator.classList.add("connected");
          statusIndicator.title = "Firebase Terhubung";
        } else {
          throw new Error("Objek Firebase Auth tidak ditemukan.");
        }
      } catch (error) {
        statusIndicator.classList.add("error");
        statusIndicator.title =
          "Gagal terhubung ke Firebase. Periksa konsol (F12).";
        console.error("Error Inisialisasi Firebase:", error);
      }

      // Terapkan tema secepat mungkin
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      document
        .getElementById("login-form")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          const loginInput = document.getElementById("login-input").value;
          const password = document.getElementById("password").value;
          const errorMessage = document.getElementById("error-message");
          errorMessage.textContent = ""; // Clear previous errors

          // Fungsi untuk melakukan login setelah mendapatkan email
          const performLogin = (email) => {
            if (!email) {
              errorMessage.textContent = "Email atau Username salah!";
              return;
            }
            auth
              .signInWithEmailAndPassword(email, password)
              .then((userCredential) => {
                window.location.href = "index.html";
              })
              .catch((error) => {
                console.error("Login error:", error.code);
                if (
                  error.code === "auth/user-not-found" ||
                  error.code === "auth/wrong-password" ||
                  error.code === "auth/invalid-credential"
                ) {
                  errorMessage.textContent = "Email atau Password salah!";
                } else {
                  errorMessage.textContent =
                    "Terjadi kesalahan. Periksa konsol (F12) untuk detail.";
                }
              });
          };

          // Cek apakah input adalah email atau username
          if (loginInput.includes("@")) {
            // Pengguna memasukkan email
            performLogin(loginInput);
          } else {
            // Pengguna memasukkan username, cari email di Firestore
            db.collection("users")
              .where("displayName", "==", loginInput)
              .get()
              .then((snapshot) => {
                if (snapshot.empty) {
                  // Username tidak ditemukan
                  errorMessage.textContent = "Username atau Password salah!";
                } else {
                  // Username ditemukan, ambil emailnya
                  const userData = snapshot.docs[0].data();
                  performLogin(userData.email);
                }
              })
              .catch((error) => {
                console.error("Error querying Firestore:", error);
                // This error often happens if a Firestore index is missing.
                // The console (F12) will have a link to create it.
                errorMessage.textContent =
                  "Gagal mencari username. Periksa konsol (F12) untuk detail teknis.";
              });
          }
        });

      // Event listener untuk tombol login Google
      document
        .getElementById("google-login-btn")
        .addEventListener("click", function () {
          const provider = new firebase.auth.GoogleAuthProvider();

          auth
            .signInWithPopup(provider)
            .then((result) => {
              // Login dengan Google berhasil
              console.log("Login Google berhasil:", result.user);
              window.location.href = "index.html";
            })
            .catch((error) => {
              // Gagal login dengan Google
              console.error("Error login Google:", error);
              document.getElementById("error-message").textContent =
                "Gagal login dengan Google: " + error.message;
            });
        });
    </script>
  </body>
</html>
