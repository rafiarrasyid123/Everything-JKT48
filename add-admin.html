<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Admin - Mikaela Fan Page</title>
    <link rel="stylesheet" href="mikaela.css" />
    <style>
      /* Variabel Tema untuk Halaman Admin */
      :root,
      [data-theme="light"] {
        --body-bg: #f0f2f5;
        --container-bg: white;
        --text-color: #333;
        --input-bg: #ffffff;
        --input-border: #ccc;
        --input-text: #212529;
        --link-color: #007bff;
      }
      [data-theme="dark"] {
        --body-bg: #1a202c;
        --container-bg: #2d3748;
        --text-color: #e2e8f0;
        --input-bg: #1a202c;
        --input-border: #4a5568;
        --input-text: #e2e8f0;
        --link-color: #63b3ed;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--body-bg);
        color: var(--text-color);
        font-family: sans-serif;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      .admin-container {
        background: var(--container-bg);
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
        margin-top: 20px;
        transition: background-color 0.4s ease;
      }
      .admin-container h1 {
        margin-bottom: 1.5rem;
        color: var(--text-color);
        transition: color 0.4s ease;
      }
      .admin-container input {
        box-sizing: border-box;
        width: 100%;
        padding: 10px;
        margin-bottom: 1rem;
        border: 1px solid var(--input-border);
        background-color: var(--input-bg);
        color: var(--input-text);
        transition: background-color 0.4s ease, color 0.4s ease,
          border-color 0.4s ease;
        border-radius: 4px;
      }
      .admin-container button {
        width: 100%;
        padding: 10px;
        background-color: #d83a7c;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }
      .admin-container a {
        display: block;
        margin-top: 1rem;
        color: var(--link-color);
        text-decoration: none;
        transition: color 0.4s ease;
      }
      #message {
        color: red;
        margin-top: 1rem;
        height: 2em;
      }
      .instructions {
        text-align: left;
        margin-top: 1.5rem;
        padding: 1rem;
        background-color: rgba(0, 0, 0, 0.03);
        border-left: 4px solid #d83a7c;
        border-radius: 4px;
      }
      .instructions h3 {
        margin-top: 0;
      }
      .instructions ol {
        padding-left: 20px;
      }
      .instructions li {
        margin-bottom: 10px;
      }
      .instructions code {
        background-color: rgba(0, 0, 0, 0.1);
        padding: 2px 6px;
        border-radius: 3px;
        font-family: "Courier New", Courier, monospace;
      }
    </style>
  </head>
  <body class="is-loading">
    <button class="hamburger-menu" aria-label="Buka menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="overlay"></div>

    <nav class="nav">
      <a href="index.html">Beranda</a>
      <a href="about.html"> Bio Mikaela </a>
      <a href="everything.html">Everything</a>
      <a href="List.html">Saluran Everything JKT48</a>
      <a href="profile.html">Profil</a>
      <a href="account-list.html" id="account-list-link">Data Akun</a>
      <a href="add-admin.html" id="add-admin-link">Tambah Admin</a>
      <a href="#" id="theme-toggle-btn">Mode Gelap</a>
      <a href="#" id="logout-btn">Logout</a>
    </nav>

    <div class="admin-container">
      <h1>Tambah Admin Baru</h1>
      <p>
        Masukkan email calon admin yang <strong>sudah terdaftar</strong> untuk
        menghasilkan baris kode yang perlu ditambahkan.
      </p>
      <form id="add-admin-form">
        <input
          type="email"
          id="new-admin-email"
          placeholder="Email Admin Baru"
          required
        />
        <button type="submit">Jadikan Admin</button>
      </form>

      <p id="message"></p>

      <a href="index.html">Kembali ke Beranda</a>
    </div>

    <!-- Pengecekan login dan role admin -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="auth.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      applyInitialTheme();
      checkAuthentication((user, userData) => {
        document.body.classList.remove("is-loading");
        manageNavLinks(userData); // <-- Tambahkan ini agar menu tetap ada
        setupThemeSwitcher();
        setupLogoutButton();
        setupMobileMenu();
      });
      protectAdminRoute();
    </script>
    <script>
      document
        .getElementById("add-admin-form")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          const form = event.target;
          const button = form.querySelector("button");
          const newAdminEmail =
            document.getElementById("new-admin-email").value;
          const messageEl = document.getElementById("message");

          button.disabled = true;
          messageEl.textContent = "Memproses...";
          messageEl.style.color = "blue";

          // Cari pengguna berdasarkan email di Firestore
          db.collection("users")
            .where("email", "==", newAdminEmail)
            .get()
            .then((snapshot) => {
              if (snapshot.empty) {
                messageEl.style.color = "red";
                messageEl.textContent = "Error: Email tidak ditemukan.";
                button.disabled = false;
                return;
              }

              // Update role pengguna menjadi admin
              const userDoc = snapshot.docs[0];
              return db.collection("users").doc(userDoc.id).update({
                role: "admin",
              });
            })
            .then(() => {
              messageEl.style.color = "green";
              messageEl.textContent = `Sukses! Pengguna dengan email ${newAdminEmail} sekarang adalah admin.`;
              document.getElementById("add-admin-form").reset();
              button.disabled = false;
            })
            .catch((error) => {
              messageEl.style.color = "red";
              if (error.code === "failed-precondition") {
                messageEl.innerHTML =
                  "Error: Diperlukan Firestore Index. <br>Buka konsol (F12), cari link di pesan error, dan klik untuk membuatnya.";
              } else {
                messageEl.textContent = "Error: " + error.message;
              }
              console.error("Gagal menjadikan admin:", error);
              button.disabled = false;
            });
        });
    </script>
  </body>
</html>
