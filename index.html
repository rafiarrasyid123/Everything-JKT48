<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title> Everything Login </title>
    <link rel="stylesheet" href="mikaela.css" />
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Masuk ke Akun</h1>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username/Email:</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="login-btn">Masuk</button>
            </form>

            <div class="login-links">
                <a href="register.html" class="auth-link">Buat Akun Baru</a>
                <a href="reset-password.html" class="auth-link">Lupa Password?</a>
            </div>

            <div id="loginMessage" class="message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
