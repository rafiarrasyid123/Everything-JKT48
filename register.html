<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daftar Akun - Mikaela</title>
    <link rel="stylesheet" href="mikaela.css" />
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Buat Akun Baru</h1>
            <form id="registerForm" class="login-form">
                <div class="form-group">
                    <label for="regUsername">Username:</label>
                    <input type="text" id="regUsername" name="username" required minlength="3">
                    <small class="form-help">Minimal 3 karakter</small>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email:</label>
                    <input type="email" id="regEmail" name="email" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password:</label>
                    <input type="password" id="regPassword" name="password" required minlength="6">
                    <small class="form-help">Minimal 6 karakter</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" class="login-btn">Daftar</button>
            </form>

            <div class="login-links">
                <a href="index.html" class="auth-link">Sudah punya akun? Masuk</a>
            </div>

            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
