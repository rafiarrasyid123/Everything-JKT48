<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password - Mikaela Fan Page</title>
    <link rel="stylesheet" href="mikaela.css" />
    <style>
      /* Variabel Tema untuk Halaman Lupa Password */
      :root,
      [data-theme="light"] {
        --body-bg: #f0f2f5;
        --container-bg: white;
        --text-color: #333;
        --input-bg: #ffffff;
        --input-border: #ccc;
        --input-text: #212529;
        --link-color: #007bff;
        --warning-text: #8b0000;
      }
      [data-theme="dark"] {
        --body-bg: #1a202c;
        --container-bg: #2d3748;
        --text-color: #e2e8f0;
        --input-bg: #1a202c;
        --input-border: #4a5568;
        --input-text: #e2e8f0;
        --link-color: #63b3ed;
        --warning-text: #fbd38d;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--body-bg);
        color: var(--text-color);
        font-family: sans-serif;
        transition: background-color 0.4s ease, color 0.4s ease;
      }
      .forgot-container {
        background: var(--container-bg);
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
        transition: background-color 0.4s ease;
      }
      .forgot-container h1 {
        margin-bottom: 1.5rem;
        color: var(--text-color);
        transition: color 0.4s ease;
      }
      .forgot-container input {
        box-sizing: border-box;
        width: 100%;
        padding: 10px;
        margin-bottom: 1rem;
        border: 1px solid var(--input-border);
        background-color: var(--input-bg);
        color: var(--input-text);
        transition: background-color 0.4s ease, color 0.4s ease,
          border-color 0.4s ease;
        border-radius: 4px;
      }
      .forgot-container button {
        width: 100%;
        padding: 10px;
        background-color: #d83a7c;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }
      .forgot-container a {
        display: block;
        margin-top: 1rem;
        color: var(--link-color);
        text-decoration: none;
        transition: color 0.4s ease;
      }
      #message {
        color: blue;
        margin-top: 1rem;
        min-height: 3em;
        font-weight: bold;
      }
      .warning {
        color: var(--warning-text);
        font-size: 0.8em;
        transition: color 0.4s ease;
      }
    </style>
  </head>
  <body>
    <script>
      // Terapkan tema secepat mungkin
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <div class="forgot-container">
      <h1>Lupa Password</h1>
      <form id="forgot-form">
        <div>
          <input
            type="text"
            id="username"
            placeholder="Masukkan Username Anda"
            required
          />
        </div>
        <button type="submit">Cari Akun</button>
      </form>
      <p id="message"></p>
      <p class="warning">
        <strong>Peringatan:</strong> Fitur ini hanya untuk simulasi. Di aplikasi
        nyata, password tidak akan pernah ditampilkan seperti ini.
      </p>
      <a href="login.html">Kembali ke Login</a>
    </div>

    <script>
      document
        .getElementById("forgot-form")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          const username = document.getElementById("username").value;
          const messageEl = document.getElementById("message");

          let accounts = JSON.parse(localStorage.getItem("userAccounts")) || [];

          if (username.toLowerCase() === "raffz") {
            messageEl.style.color = "red";
            messageEl.textContent =
              "Password akun admin tidak dapat dipulihkan melalui fitur ini.";
            return;
          }

          const account = accounts.find(
            (acc) => acc.username.toLowerCase() === username.toLowerCase()
          );

          if (account) {
            messageEl.innerHTML = `Akun ditemukan! <br> Password Anda adalah: <strong>${account.password}</strong>`;
          } else {
            messageEl.style.color = "red";
            messageEl.textContent = "Username tidak ditemukan!";
          }
        });
    </script>
  </body>
</html>
