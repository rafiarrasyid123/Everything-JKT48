<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Pengguna - Mikaela Fan Page</title>
    <link rel="stylesheet" href="mikaela.css" />
    <style>
      /* Variabel Tema untuk Halaman Profil */
      :root,
      [data-theme="light"] {
        --container-bg: rgba(255, 255, 255, 0.9);
        --text-color: #333;
        --role-text-color: #666;
        --border-color: #eee;
      }
      [data-theme="dark"] {
        --container-bg: rgba(45, 55, 72, 0.9);
        --text-color: #e2e8f0;
        --role-text-color: #a0aec0;
        --border-color: #4a5568;
      }

      .profile-container {
        max-width: 600px;
        margin: 4rem auto;
        padding: 2rem 3rem;
        background-color: var(--container-bg);
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        text-align: center;
        transition: background-color 0.4s ease;
      }
      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background-color: #d83a7c;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        font-weight: bold;
        margin: 0 auto 1.5rem;
        text-transform: uppercase;
        cursor: pointer; /* Menandakan bisa diklik */
        background-size: cover; /* Agar gambar isian pas */
        background-position: center; /* Posisi gambar di tengah */
        position: relative; /* Untuk ikon overlay */
      }
      .username-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 0.5rem; /* Memberi jarak ke tulisan role di bawahnya */
      }
      .profile-info h2 {
        margin: 0;
        font-size: 2rem;
        color: var(--text-color);
        transition: color 0.4s ease;
      }
      .profile-info p {
        margin-top: 0.5rem;
        font-size: 1.1rem;
        color: var(--role-text-color);
        text-transform: capitalize;
        transition: color 0.4s ease;
      }
      .edit-btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background-color 0.2s;
        display: none; /* Sembunyikan secara default */
      }
      .edit-btn:hover {
        background-color: #0056b3;
      }
      .profile-input {
        font-size: 1.5rem;
        padding: 5px 8px;
        border: 2px solid var(--input-border-color);
        border-radius: 5px;
        text-align: center;
        max-width: 250px;
      }
      .save-btn {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
      }
      .cancel-btn {
        background-color: #6c757d;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
      }
      .profile-actions {
        margin-top: 1.5rem;
        border-top: 1px solid var(--border-color);
        padding-top: 1.5rem;
        transition: border-top-color 0.4s ease;
      }
      .action-button {
        background-color: #6c757d;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background-color 0.2s;
      }

      .action-button:hover {
        background-color: #5a6268;
      }
      .action-button:disabled {
        background-color: #adb5bd;
        cursor: not-allowed;
      }
    </style>
    <style>
      /* Sembunyikan konten sampai status login diverifikasi */
      body.is-loading {
        display: none;
      }
    </style>
  </head>
  <body class="is-loading">
    <nav class="nav">
      <a href="index.html">Beranda</a>
      <a href="about.html"> Bio Mikaela </a>
      <a href="everything.html">Everything</a>
      <a href="List.html">Saluran Everything JKT48</a>
      <a href="profile.html">Profil</a>
      <a href="account-list.html" id="account-list-link" style="display: none"
        >Data Akun</a
      >
      <a href="add-admin.html" id="add-admin-link" style="display: none"
        >Tambah Admin</a
      >
      <a href="#" id="theme-toggle-btn">Mode Gelap</a>
      <a href="#" id="logout-btn">Logout</a>
    </nav>

    <div class="profile-container">
      <div id="profile-avatar" class="profile-avatar"></div>
      <div class="profile-info">
        <!-- Mode Tampilan -->
        <div id="view-mode-wrapper" class="username-wrapper">
          <h2 id="profile-username"></h2>
          <button id="edit-username-btn" class="edit-btn">Ubah</button>
        </div>
        <!-- Mode Edit (tersembunyi) -->
        <div
          id="edit-mode-wrapper"
          class="username-wrapper"
          style="display: none"
        >
          <input type="text" id="edit-username-input" class="profile-input" />
          <button id="save-username-btn" class="save-btn">Simpan</button>
          <button id="cancel-edit-btn" class="cancel-btn">Batal</button>
        </div>
        <p
          id="username-error"
          style="color: red; font-size: 0.9rem; height: 1em"
        ></p>
        <p id="profile-email"></p>
      </div>
      <div class="profile-actions">
        <button id="change-password-btn" class="action-button">
          Ubah Password
        </button>
        <p
          id="password-reset-info"
          style="
            font-size: 0.8rem;
            color: var(--role-text-color);
            display: none;
            margin-top: 10px;
          "
        >
          Password tidak dapat diubah untuk akun yang login via Google atau
          metode lainnya.
        </p>
      </div>
    </div>

    <!-- Input file tersembunyi untuk unggah avatar -->
    <input type="file" id="avatar-upload" accept="image/*" hidden />

    <!-- Firebase SDK & Config -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="auth.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      applyInitialTheme();
      // checkAuthentication adalah satu-satunya sumber kebenaran untuk status login
      checkAuthentication((user, userData) => {
        // 1. Tampilkan halaman setelah login terverifikasi
        document.body.classList.remove("is-loading");

        // 2. Atur link navigasi berdasarkan peran pengguna (admin/biasa)
        manageNavLinks(userData);

        // 3. Panggil semua fungsi setup UI di sini
        setupThemeSwitcher();
        setupLogoutButton();

        // 4. Dapatkan elemen DOM dan perbarui UI dengan data pengguna
        const profileAvatar = document.getElementById("profile-avatar");
        const profileUsername = document.getElementById("profile-username");
        const profileEmail = document.getElementById("profile-email");
        const editUsernameBtn = document.getElementById("edit-username-btn");
        const changePasswordBtn = document.getElementById(
          "change-password-btn"
        );
        const viewModeWrapper = document.getElementById("view-mode-wrapper");
        const editModeWrapper = document.getElementById("edit-mode-wrapper");
        const editUsernameInput = document.getElementById(
          "edit-username-input"
        );
        const saveUsernameBtn = document.getElementById("save-username-btn");
        const cancelEditBtn = document.getElementById("cancel-edit-btn");
        const usernameError = document.getElementById("username-error");
        const avatarUpload = document.getElementById("avatar-upload");

        const displayName =
          userData.displayName || user.displayName || "Tanpa Nama";
        const email = user.email;

        profileUsername.textContent = displayName;
        profileEmail.textContent = email;

        if (user.photoURL) {
          profileAvatar.style.backgroundImage = `url(${user.photoURL})`;
          profileAvatar.textContent = "";
        } else {
          profileAvatar.textContent = (
            displayName[0] || email[0]
          ).toUpperCase();
        }

        editUsernameBtn.style.display = "inline-block";

        // --- Logika untuk Unggah Foto Profil ---

        // Saat avatar diklik, buka dialog file
        profileAvatar.addEventListener("click", () => {
          avatarUpload.click();
        });

        // Saat file dipilih
        avatarUpload.addEventListener("change", async (event) => {
          const file = event.target.files[0];
          if (!file) return;

          // Tampilkan status loading di avatar
          profileAvatar.textContent = "...";
          profileAvatar.style.backgroundImage = "";

          try {
            // Buat referensi di Firebase Storage
            const filePath = `profile_pictures/${user.uid}/${file.name}`;
            const fileRef = storage.ref(filePath);

            // Unggah file
            const uploadTask = await fileRef.put(file);

            // Dapatkan URL download
            const photoURL = await uploadTask.ref.getDownloadURL();

            // Perbarui profil di Auth dan Firestore
            await user.updateProfile({ photoURL: photoURL });
            await db.collection("users").doc(user.uid).update({ photoURL: photoURL });

            alert("Foto profil berhasil diperbarui!");
            window.location.reload();
          } catch (error) {
            console.error("Gagal mengunggah foto:", error);
            alert("Gagal mengunggah foto profil. Periksa konsol (F12) untuk detail.");
            window.location.reload(); // Muat ulang untuk mengembalikan tampilan
          }
        });

        // --- Logika untuk Mode Edit ---

        // Saat tombol "Ubah" diklik
        editUsernameBtn.addEventListener("click", () => {
          viewModeWrapper.style.display = "none";
          editModeWrapper.style.display = "flex";
          editUsernameInput.value = displayName;
          editUsernameInput.focus();
          usernameError.textContent = "";
        });

        // Saat tombol "Batal" diklik
        cancelEditBtn.addEventListener("click", () => {
          editModeWrapper.style.display = "none";
          viewModeWrapper.style.display = "flex";
        });

        // Saat tombol "Simpan" diklik
        saveUsernameBtn.addEventListener("click", async () => {
          const newName = editUsernameInput.value.trim();
          usernameError.textContent = "";

          if (!newName) {
            usernameError.textContent = "Username tidak boleh kosong.";
            return;
          }
          if (newName.toLowerCase() === displayName.toLowerCase()) {
            // Jika tidak ada perubahan, batalkan saja
            cancelEditBtn.click();
            return;
          }

          saveUsernameBtn.disabled = true;
          saveUsernameBtn.textContent = "Menyimpan...";

          try {
            // Cek keunikan username di Firestore
            const snapshot = await db
              .collection("users")
              .where("displayName", "==", newName)
              .get();

            if (!snapshot.empty) {
              usernameError.textContent = "Username sudah digunakan.";
              saveUsernameBtn.disabled = false;
              saveUsernameBtn.textContent = "Simpan";
              return;
            }

            // Jika unik, update Auth dan Firestore
            await user.updateProfile({ displayName: newName });
            await db
              .collection("users")
              .doc(user.uid)
              .update({ displayName: newName });

            alert("Nama tampilan berhasil diperbarui!");
            window.location.reload();
          } catch (error) {
            console.error("Error updating username:", error);
            usernameError.textContent = "Gagal memperbarui nama.";
            saveUsernameBtn.disabled = false;
            saveUsernameBtn.textContent = "Simpan";
          }
        });

        // Cek metode login pengguna
        const passwordProvider = user.providerData.find(
          (provider) => provider.providerId === "password"
        );
        const passwordResetInfo = document.getElementById(
          "password-reset-info"
        );

        if (passwordProvider) {
          // Jika pengguna login dengan email/password, aktifkan fitur ubah password
          changePasswordBtn.addEventListener("click", () => {
            if (
              confirm(
                "Anda akan dikirimi email untuk mereset password. Lanjutkan?"
              )
            ) {
              // Nonaktifkan tombol dan tampilkan status mengirim
              changePasswordBtn.disabled = true;
              changePasswordBtn.textContent = "Mengirim...";

              auth
                .sendPasswordResetEmail(email)
                .then(() => {
                  alert(
                    "Email reset password telah dikirim. Silakan periksa inbox Anda."
                  );
                  // Kembalikan tombol ke keadaan semula
                  changePasswordBtn.disabled = false;
                  changePasswordBtn.textContent = "Ubah Password";
                })
                .catch((error) => {
                  alert("Gagal mengirim email: " + error.message);
                  // Kembalikan tombol jika terjadi error
                  changePasswordBtn.disabled = false;
                  changePasswordBtn.textContent = "Ubah Password";
                });
            }
          });
        } else {
          // Jika pengguna login via Google atau lainnya, nonaktifkan tombol
          changePasswordBtn.textContent = "Login via Pihak Ketiga";
          changePasswordBtn.disabled = true;
          passwordResetInfo.style.display = "block";
        }
      });
    </script>
  </body>
</html>
