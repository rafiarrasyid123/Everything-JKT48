<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Management - Mikaela</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .current-device {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            border: 2px solid #667eea;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .device-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .device-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .device-details h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .device-details p {
            color: #666;
            font-size: 14px;
        }

        .current-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .device-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .device-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .device-item.current-device {
            border: 2px solid #667eea;
            background: linear-gradient(135deg, #f8f9ff 0%, #fff5ff 100%);
        }

        .device-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .device-name {
            font-weight: bold;
            color: #333;
            font-size: 18px;
        }

        .device-details {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .device-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .current-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-devices {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .no-devices .icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }

            .device-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Device Management</h1>
            <p>Kelola device yang terhubung dengan akun Anda</p>
        </div>

        <div class="content">
            <!-- Current Device Section -->
            <div class="section">
                <h2 class="section-title">
                    <div class="icon">📱</div>
                    Device Saat Ini
                </h2>
                <div id="currentDevice" class="current-device">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat informasi device...</p>
                    </div>
                </div>
            </div>

            <!-- Statistics -->
            <div class="section">
                <h2 class="section-title">
                    <div class="icon">📊</div>
                    Statistik
                </h2>
                <div class="stats">
                    <div class="stat-card">
                        <div id="totalDevices" class="stat-number">-</div>
                        <div class="stat-label">Total Device</div>
                    </div>
                    <div class="stat-card">
                        <div id="activeDevices" class="stat-number">-</div>
                        <div class="stat-label">Device Aktif</div>
                    </div>
                    <div class="stat-card">
                        <div id="lastSync" class="stat-number">-</div>
                        <div class="stat-label">Terakhir Sync</div>
                    </div>
                </div>
            </div>

            <!-- Connected Devices -->
            <div class="section">
                <h2 class="section-title">
                    <div class="icon">🔗</div>
                    Device Terhubung
                </h2>
                <div id="deviceList" class="device-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat device terhubung...</p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button onclick="refreshDevices()" class="btn btn-primary">
                    🔄 Refresh
                </button>
                <button onclick="exportDeviceData()" class="btn btn-secondary">
                    📥 Export Data
                </button>
                <a href="home.html" class="btn btn-secondary">
                    🏠 Kembali
                </a>
            </div>
        </div>
    </div>

    <!-- GitHub Auth Script -->
    <script src="github-config.js"></script>
    <script src="github-auth.js"></script>
    <script src="device-manager.js"></script>

    <script>
        // Additional functions for device dashboard
        function refreshDevices() {
            if (window.deviceManager) {
                deviceManager.loadConnectedDevices();
                updateStatistics();
            }
        }

        function exportDeviceData() {
            if (window.deviceManager) {
                const devices = window.deviceManager.getConnectedDevices();
                const exportData = {
                    devices: devices,
                    exportDate: new Date().toISOString(),
                    currentDevice: window.deviceManager.getCurrentDevice()
                };

                const dataStr = JSON.stringify(exportData, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `device-data-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                alert('Data device berhasil di-export!');
            }
        }

        function updateStatistics() {
            if (window.deviceManager) {
                const devices = window.deviceManager.getConnectedDevices();
                const currentDevice = window.deviceManager.getCurrentDevice();

                // Update statistics
                document.getElementById('totalDevices').textContent = devices.length;
                document.getElementById('activeDevices').textContent = devices.length;

                const lastSync = currentDevice ? new Date(currentDevice.lastActive) : new Date();
                document.getElementById('lastSync').textContent = formatTimeAgo(lastSync);
            }
        }

        function formatTimeAgo(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);

            if (minutes < 1) return 'Baru saja';
            if (minutes < 60) return `${minutes}m lalu`;

            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}j lalu`;

            const days = Math.floor(hours / 24);
            return `${days}h lalu`;
        }

        function updateCurrentDeviceInfo() {
            if (window.deviceManager) {
                const currentDevice = window.deviceManager.getCurrentDevice();
                const container = document.getElementById('currentDevice');

                if (currentDevice) {
                    container.innerHTML = `
                        <div class="device-info">
                            <div class="device-icon">
                                ${getDeviceIcon(currentDevice.type)}
                            </div>
                            <div class="device-details">
                                <h3>${currentDevice.name}</h3>
                                <p>${currentDevice.browser} on ${currentDevice.os}</p>
                                <p>Screen: ${currentDevice.screen.width}x${currentDevice.screen.height}</p>
                                <p>Device ID: ${currentDevice.id.substring(0, 8)}...</p>
                            </div>
                            <div class="current-badge">Current Device</div>
                        </div>
                    `;
                }
            }
        }

        function getDeviceIcon(type) {
            switch (type) {
                case 'mobile': return '📱';
                case 'tablet': return '📱';
                case 'desktop': return '💻';
                default: return '🖥️';
            }
        }

        // Initialize dashboard when page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Wait for device manager to be ready
            setTimeout(() => {
                updateCurrentDeviceInfo();
                updateStatistics();
            }, 2000);
        });
    </script>
</body>
</html>
