<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Authentication - Mikaela</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #333, #555);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .title {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: 500;
        }

        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .hidden {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">M</div>
        <h1 class="title">GitHub Authentication</h1>
        <p class="subtitle">Menghubungkan akun Anda dengan GitHub...</p>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 30%"></div>
            </div>
            <div id="statusText">Memproses autentikasi...</div>
        </div>

        <div id="success" class="hidden">
            <div class="status success">
                ✅ Berhasil terhubung dengan GitHub!
            </div>
            <p>Mengalihkan ke halaman utama...</p>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 100%"></div>
            </div>
        </div>

        <div id="error" class="hidden">
            <div class="status error">
                ❌ Gagal autentikasi dengan GitHub
            </div>
            <p id="errorMessage">Terjadi kesalahan saat memproses autentikasi.</p>
            <a href="index.html" class="btn">Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        // GitHub OAuth Callback Handler
        class GitHubCallback {
            constructor() {
                this.initializeCallback();
            }

            async initializeCallback() {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const error = urlParams.get('error');
                const errorDescription = urlParams.get('error_description');

                if (error) {
                    this.showError(errorDescription || error);
                    return;
                }

                if (code) {
                    await this.processCallback(code);
                } else {
                    this.showError('Authorization code tidak ditemukan');
                }
            }

            async processCallback(code) {
                try {
                    // Update status
                    this.updateStatus('Menukar kode autorisasi...', 50);

                    // Exchange code for token
                    const response = await fetch('https://github.com/login/oauth/access_token', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            client_id: 'YOUR_GITHUB_CLIENT_ID', // Ganti dengan Client ID Anda
                            client_secret: 'YOUR_GITHUB_CLIENT_SECRET', // Ganti dengan Client Secret Anda
                            code: code,
                            redirect_uri: window.location.origin + '/github-callback.html'
                        })
                    });

                    if (!response.ok) {
                        throw new Error('Failed to exchange code for token');
                    }

                    const data = await response.json();

                    if (data.error) {
                        throw new Error(data.error_description || data.error);
                    }

                    const accessToken = data.access_token;

                    // Get user information
                    this.updateStatus('Mengambil informasi user...', 75);

                    const userResponse = await fetch('https://api.github.com/user', {
                        headers: {
                            'Authorization': `token ${accessToken}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'User-Agent': 'Mikaela-Auth-System'
                        }
                    });

                    if (!userResponse.ok) {
                        throw new Error('Failed to get user information');
                    }

                    const userInfo = await userResponse.json();

                    // Save authentication data
                    const userData = {
                        id: userInfo.id,
                        username: userInfo.login,
                        email: userInfo.email,
                        name: userInfo.name,
                        avatar: userInfo.avatar_url,
                        githubUrl: userInfo.html_url
                    };

                    localStorage.setItem('github_access_token', accessToken);
                    localStorage.setItem('github_user', JSON.stringify(userData));

                    // Setup repository if needed
                    this.updateStatus('Menyiapkan repository...', 90);

                    await this.setupRepository(userInfo.login, accessToken);

                    // Success
                    this.updateStatus('Selesai!', 100);
                    this.showSuccess();

                    // Redirect after delay
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 2000);

                } catch (error) {
                    console.error('Callback processing error:', error);
                    this.showError(error.message);
                }
            }

            async setupRepository(username, token) {
                try {
                    // Check if repository exists
                    const repoResponse = await fetch(`https://api.github.com/repos/${username}/mikaela-auth-system`, {
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'User-Agent': 'Mikaela-Auth-System'
                        }
                    });

                    if (repoResponse.status === 404) {
                        // Create repository
                        const createResponse = await fetch('https://api.github.com/user/repos', {
                            method: 'POST',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json',
                                'Accept': 'application/vnd.github.v3+json',
                                'User-Agent': 'Mikaela-Auth-System'
                            },
                            body: JSON.stringify({
                                name: 'mikaela-auth-system',
                                description: 'Mikaela Authentication System - User Data Repository',
                                public: false,
                                auto_init: true
                            })
                        });

                        if (!createResponse.ok) {
                            throw new Error('Failed to create repository');
                        }
                    }
                } catch (error) {
                    console.error('Repository setup error:', error);
                    // Don't throw error here, continue with authentication
                }
            }

            updateStatus(message, progress) {
                const statusText = document.getElementById('statusText');
                const progressFill = document.querySelector('.progress-fill');

                if (statusText) statusText.textContent = message;
                if (progressFill) progressFill.style.width = `${progress}%`;
            }

            showSuccess() {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            }

            showError(message) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('errorMessage').textContent = message;
            }
        }

        // Initialize callback handler
        document.addEventListener('DOMContentLoaded', () => {
            new GitHubCallback();
        });
    </script>
</body>
</html>
