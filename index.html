<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title> Mikaela - Akses Dibatasi </title>
    <link rel="stylesheet" href="mikaela.css" />
    <script src="auth.js"></script>
    <style>
        .access-denied {
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        .access-denied h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .access-denied p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .login-btn {
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .login-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="access-denied">
        <h1>🔒 Akses Dibatasi</h1>
        <p>Anda harus masuk terlebih dahulu untuk mengakses halaman ini.</p>
        <a href="login.html" class="login-btn">Masuk Sekarang</a>
    </div>
</body>
</html>
